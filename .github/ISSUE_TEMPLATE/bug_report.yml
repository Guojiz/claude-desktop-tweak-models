name: Bug report
description: Report a reproducible problem
title: "Bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: input
    id: claude-version
    attributes:
      label: Claude Desktop version
      placeholder: e.g. 0.x.x
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      placeholder: e.g. Windows 11 23H2
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Redact tokens, keys, account IDs, and private paths before posting.